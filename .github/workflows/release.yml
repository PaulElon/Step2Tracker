name: Release Desktop App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish-tauri:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Stamp CI release version
        shell: bash
        run: |
          VERSION="$(node <<'NODE'
          const fs = require('fs');

          const pkgPath = 'package.json';
          const tauriPath = 'src-tauri/tauri.conf.json';
          const cargoPath = 'src-tauri/Cargo.toml';

          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          const cargo = fs.readFileSync(cargoPath, 'utf8');

          const [major = '0', minor = '0'] = String(pkg.version || tauri.version || '0.0.0').split('.');
          const runNumber = process.env.GITHUB_RUN_NUMBER || '0';
          const version = `${major}.${minor}.${runNumber}`;

          pkg.version = version;
          tauri.version = version;

          const nextCargo = cargo.replace(
            /^version = ".*?"$/m,
            `version = "${version}"`
          );

          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, 2)}\n`);
          fs.writeFileSync(cargoPath, nextCargo);

          process.stdout.write(version);
          NODE
          )"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Stamped release version: $VERSION"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_FF_TIMEFOLIO: "true"
          VITE_FF_NOTEBOOK: "true"
          VITE_FF_TIPTAP_EDITOR: "true"
        with:
          tagName: app-v__VERSION__
          releaseName: TimeFolio Study Tracker v__VERSION__
          releaseBody: |
            Automated Apple Silicon macOS desktop release for commit ${{ github.sha }}.
            Signed updater artifacts and latest.json are attached below.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
          includeUpdaterJson: true
